<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Medicine Reminder — Pixel-accurate UI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app" id="app" role="application" aria-label="Medicine Reminder App">
    <header class="app-header">
      <div class="user-avatar" id="avatarPlaceholder" aria-hidden="true">👤</div>
      <div class="user-meta">
        <div class="user-name" id="userName">Имя пользователя</div>
        <div class="user-sub" id="userSub">Нажмите, чтобы сменить</div>
      </div>
      <div class="top-controls">
        <div class="month-label" id="monthLabel">Февраль, 2026</div>
        <button class="month-toggle" id="monthPrev" title="Предыдущая неделя">‹</button>
        <button class="month-toggle" id="monthNext" title="Следующая неделя">›</button>
      </div>
    </header>

    <nav class="left-pane" id="leftPane" aria-hidden="false">
      <div class="calendar" id="calendar">
        <div class="week-header">
          <div class="tiny">Неделя</div>
          <div class="tiny" id="todayLabel">Сегодня</div>
        </div>
        <div class="week-scroll" id="weekScroll" aria-label="calendar week"></div>
      </div>

      <div class="bottom-nav-left">
        <button class="nav-button-left active" data-screen="home" id="navHome">🏠</button>
        <button class="nav-button-left" data-screen="calendar" id="navCalendar">🗓</button>
        <button class="nav-button-left" data-screen="profile" id="navProfile">👤</button>
      </div>
    </nav>

    <main class="main" id="main">
      <!-- HOME SCREEN -->
      <section class="screen" id="screen-home" data-screen="home">
        <div class="section" id="todaySection">
          <div class="reminder-time" id="timeHeader">
            <div class="time-label" id="currentTimeLabel">08:30</div>
            <div class="time-actions">
              <button class="add-btn tiny" id="takeAll">Принять все</button>
            </div>
          </div>

          <div class="reminder-list" id="reminderList" aria-live="polite"></div>

          <div style="margin-top:18px;text-align:center">
            <button class="add-btn" id="addMedicationBtn">Добавить препарат</button>
          </div>
        </div>

        <div class="section">
          <div class="empty-state" id="emptyState">
            <div class="empty-illustr">🧰</div>
            <div class="empty-title">Здесь будут препараты, которые вы принимаете.</div>
            <div class="muted">Добавьте препарат, чтобы начать отслеживать приём.</div>
          </div>
        </div>
      </section>

      <!-- CALENDAR/LIST SCREEN -->
      <section class="screen hidden" id="screen-calendar" data-screen="calendar">
        <h2 class="section-title">Календарь приёмов</h2>
        <div id="calendarDetails" class="calendar-details muted">Выберите день в неделе слева</div>
      </section>

      <!-- PROFILE SCREEN -->
      <section class="screen hidden" id="screen-profile" data-screen="profile">
        <h2 class="section-title">Профиль</h2>
        <div class="card profile-card">
          <div class="profile-row"><strong id="profileName">Имя пользователя</strong></div>
          <div class="profile-row muted" id="profileNick">@username</div>
          <div class="profile-actions" style="margin-top:12px">
            <button class="btn" id="logoutBtn">Выйти</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Modal -->
    <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h3 id="modalTitle">Добавить препарат</h3>
        <div class="field">
          <label for="medName">Название</label>
          <input id="medName" placeholder="Например: Парацетамол" />
        </div>
        <div class="row">
          <div class="field small">
            <label for="medDose">Дозировка</label>
            <input id="medDose" placeholder="1 таб." />
          </div>
          <div class="field small">
            <label for="medTime">Время</label>
            <input id="medTime" type="time" value="08:30" />
          </div>
        </div>
        <div class="row" style="justify-content:flex-end;margin-top:10px">
          <button class="add-btn" id="saveMed">Сохранить</button>
          <button class="add-btn alt" id="cancelMed">Отмена</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
