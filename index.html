<!DOCTYPE html>
<html>
<head>
    <title>Telegram WebApp Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h3>Отладка Telegram WebApp</h3>
    <div id="status">Загрузка...</div>
    <button onclick="testLogin()">Тестовый вход</button>
    
    <script>
        // Эмулируем данные пользователя Telegram
        window.Telegram = {
            WebApp: {
                initData: 'user=%7B%22id%22%3A5060879118%2C%22first_name%22%3A%22%D0%A2%D0%B5%D1%81%D1%82%22%2C%22last_name%22%3A%22%22%2C%22username%22%3A%22testuser%22%2C%22language_code%22%3A%22ru%22%7D&auth_date=1234567890&hash=testhash',
                initDataUnsafe: {
                    user: {
                        id: 5060879118,
                        first_name: 'Тест',
                        last_name: '',
                        username: 'testuser',
                        language_code: 'ru'
                    }
                },
                ready: function() { console.log('WebApp ready'); },
                expand: function() { console.log('WebApp expanded'); }
            }
        };
        
        async function testLogin() {
            const response = await fetch('https://medicine-reminder-app-t3u9.onrender.com/api/auth/telegram', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: window.Telegram.WebApp.initData })
            });
            const data = await response.json();
            console.log('Ответ сервера:', data);
            document.getElementById('status').innerHTML = 
                '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }
    </script>
</body>
</html>
